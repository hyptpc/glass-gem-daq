<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>DAQ</title>
    <script src="https://cdn.jsdelivr.net/npm/plotly.js-dist-min@2.27.0/plotly.min.js"></script>
    <style>
      html,
      body {
        height: 100%;
      }
      body {
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
        margin: 0;
        padding: 0;
        background: #121212;
        color: #e0e0e0;
        overflow-y: auto;
      }
      header {
        padding: 8px 12px;
        background: #1e1e1e;
        color: #f5f5f5;
        font-size: 15px;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      main {
        width: 100%;
        height: calc(100vh - 36px);
        margin: 0;
        display: flex;
        gap: 8px;
        padding: 8px;
        box-sizing: border-box;
      }
      .main-left {
        flex: 3;
        display: flex;
        flex-direction: column;
        min-height: 0;
      }
      .main-right {
        flex: 2;
        display: flex;
        flex-direction: column;
        gap: 8px;
        min-height: 0;
        overflow-y: auto;
      }
      section {
        border: 1px solid #333;
        border-radius: 4px;
        padding: 6px;
        box-sizing: border-box;
        background: #181818;
      }
      h3,
      h4 {
        margin: 0 0 6px;
        font-size: 15px;
      }
      #wavePlot, #histPlot {
        width: 100%;
        height: 100%;
        min-height: 120px;
        background: #000;
      }
      .waveform-stack {
        flex: 1;
        display: flex;
        flex-direction: column;
        gap: 4px;
        min-height: 0;
      }
      .waveform-channel-row {
        flex: 1;
        min-height: 80px;
        display: flex;
        align-items: stretch;
        gap: 8px;
      }
      .waveform-channel-head {
        display: flex;
        align-items: center;
        gap: 8px;
        flex-shrink: 0;
        min-width: 120px;
      }
      .waveform-channel-label {
        width: 32px;
        font-size: 12px;
        font-weight: 600;
        flex-shrink: 0;
      }
      .waveform-channel-cb {
        font-size: 11px;
        color: #aaa;
        display: flex;
        align-items: center;
        gap: 2px;
        cursor: pointer;
      }
      .waveform-channel-cb input {
        margin: 0;
      }
      .wavePlotChannel {
        flex: 1;
        min-height: 60px;
        background: #000;
      }
      .camera-hist-row {
        display: flex;
        gap: 8px;
        margin-top: 8px;
        min-height: 0;
        flex: 1;
      }
      .camera-section {
        flex: 1;
        min-width: 0;
        display: flex;
        flex-direction: column;
      }
      .camera-section img {
        flex: 1;
        width: 100%;
        object-fit: contain;
        display: block;
        min-height: 0;
      }
      .hist-section {
        display: flex;
        flex-direction: column;
        flex: 1;
        min-width: 0;
        border-radius: 6px;
        overflow: hidden;
      }
      .hist-section .hist-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 6px 8px;
        background: #1a1a1a;
        border-bottom: 1px solid #333;
      }
      .hist-section .hist-count {
        font-size: 13px;
        color: #81c784;
      }
      .hist-section .hist-empty {
        padding: 24px 16px;
        text-align: center;
        color: #666;
        font-size: 13px;
      }
      #histPlot {
        flex: 1;
        min-height: 0;
      }
      .controls label {
        display: block;
        margin-bottom: 6px;
        font-size: 14px;
      }
      .controls input,
      .controls select {
        margin-bottom: 8px;
      }
      .controls button {
        margin-right: 8px;
        margin-bottom: 8px;
      }
      #capturesList {
        max-height: 100%;
        overflow-y: auto;
        font-size: 14px;
      }
      button {
        background: #2d2d2d;
        color: #f5f5f5;
        border: 1px solid #555;
        border-radius: 6px;
        padding: 8px 14px;
        font-size: 14px;
        cursor: pointer;
        min-height: 36px;
      }
      button:hover {
        background: #3d3d3d;
        border-color: #666;
      }
      button:active {
        background: #252525;
      }
      input,
      select {
        background: #1b1b1b;
        color: #f5f5f5;
        border: 1px solid #444;
        border-radius: 4px;
        padding: 6px 8px;
        font-size: 14px;
      }
      .controls,
      #capturesList {
        font-size: 14px;
      }
      #activityBadge {
        margin-right: 12px;
        font-size: 13px;
        font-weight: 600;
      }
      #activityBadge.streaming {
        color: #4fc3f7;
      }
      #activityBadge.recording {
        color: #81c784;
      }
      #activityBadge .dot {
        display: inline-block;
        width: 8px;
        height: 8px;
        border-radius: 50%;
        margin-right: 6px;
        vertical-align: middle;
      }
      #activityBadge.streaming .dot {
        background: #4fc3f7;
        animation: pulse 1.2s ease-in-out infinite;
      }
      #activityBadge.recording .dot {
        background: #81c784;
        animation: pulse 1.2s ease-in-out infinite;
      }
      @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.4; }
      }
      .section-busy {
        border-left: 4px solid #81c784;
        padding-left: 10px;
        margin-left: 2px;
        background: rgba(129, 199, 132, 0.1);
        border-radius: 0 4px 4px 0;
      }
      .section-busy.stream-section {
        border-left-color: #4fc3f7;
        background: rgba(79, 195, 247, 0.1);
      }
    </style>
  </head>
  <body>
    <header>
      <div style="display: flex; align-items: center; margin-left: auto;">
        <div id="activityBadge"></div>
        <div id="status">status: -</div>
      </div>
    </header>
    <main>
      <div class="main-left">
        <section style="flex: 1.5; display: flex; flex-direction: column; min-height: 0;">
          <div style="display: flex; justify-content: space-between; align-items: center;">
            <h3>Waveform</h3>
            <div id="freqDisplay" style="font-size: 14px; color: #81c784;">— Hz</div>
          </div>
          <div id="waveformStack" class="waveform-stack">
            <div class="waveform-channel-row">
              <div class="waveform-channel-head">
                <span class="waveform-channel-label" style="color: #E8D63B;">CH1</span>
                <label class="waveform-channel-cb"><input type="checkbox" id="chCH1" checked /> On</label>
              </div>
              <div id="wavePlotCH1" class="wavePlotChannel"></div>
            </div>
            <div class="waveform-channel-row">
              <div class="waveform-channel-head">
                <span class="waveform-channel-label" style="color: #2ECFD9;">CH2</span>
                <label class="waveform-channel-cb"><input type="checkbox" id="chCH2" /> On</label>
              </div>
              <div id="wavePlotCH2" class="wavePlotChannel"></div>
            </div>
            <div class="waveform-channel-row">
              <div class="waveform-channel-head">
                <span class="waveform-channel-label" style="color: #D870E8;">CH3</span>
                <label class="waveform-channel-cb"><input type="checkbox" id="chCH3" /> On</label>
              </div>
              <div id="wavePlotCH3" class="wavePlotChannel"></div>
            </div>
            <div class="waveform-channel-row">
              <div class="waveform-channel-head">
                <span class="waveform-channel-label" style="color: #52C755;">CH4</span>
                <label class="waveform-channel-cb"><input type="checkbox" id="chCH4" /> On</label>
              </div>
              <div id="wavePlotCH4" class="wavePlotChannel"></div>
            </div>
          </div>
        </section>
        <div class="camera-hist-row">
          <section id="cameraSection" class="camera-section" style="display: none;">
            <h3>Camera</h3>
            <img id="cameraImg" src="/camera/stream" alt="Camera" />
          </section>
          <section class="hist-section">
            <div class="hist-header">
              <h3 style="margin: 0;">Histogram</h3>
              <div id="histCount" class="hist-count">—</div>
            </div>
            <div id="histPlot"></div>
          </section>
        </div>
      </div>
      <div class="main-right">
        <section class="controls">
          <h3>Controls</h3>
          <div>
            <button id="btnHealth">Health</button>
          </div>
          <hr />
          <div>
            <h4>Run</h4>
            <label>
              Run ID
              <input
                id="inpRunId"
                type="text"
                placeholder="run_20260316_test1"
              />
            </label>
          </div>
          <hr />
          <div id="streamBlock">
            <h4>Stream</h4>
            <button id="btnStreamToggle">Start Stream</button>
          </div>
          <hr />
        <div>
          <h4>Trigger</h4>
          <label>
            Source
            <select id="selTrigSource">
              <option>CH1</option>
              <option>CH2</option>
              <option>EXT</option>
              <option>LINE</option>
            </select>
          </label>
          <label>
            Mode
            <select id="selTrigMode">
              <option>AUTO</option>
              <option>NORMAL</option>
            </select>
          </label>
          <label>
            Level (mV)
            <input id="inpTrigLevel" type="number" step="0.1" />
          </label>
          <button id="btnApplyTrigger">Apply Trigger</button>
        </div>
        <hr />
          <div>
            <h4>Histogram Settings</h4>
            <label>
              Baseline (mV) — common for all channels
              <input id="inpBaseline" type="number" step="0.1" />
            </label>
            <button id="btnSetBaseline">Set Baseline</button>
            <div style="margin-top:8px;">
              <span style="font-size:13px;">Channels to draw</span>
              <div style="display:flex;flex-wrap:wrap;gap:8px 12px; margin-top:4px;">
                <label style="display:flex;align-items:center;gap:4px;"><input type="checkbox" id="histDrawCH1" checked /> CH1</label>
                <label style="display:flex;align-items:center;gap:4px;"><input type="checkbox" id="histDrawCH2" /> CH2</label>
                <label style="display:flex;align-items:center;gap:4px;"><input type="checkbox" id="histDrawCH3" /> CH3</label>
                <label style="display:flex;align-items:center;gap:4px;"><input type="checkbox" id="histDrawCH4" /> CH4</label>
              </div>
            </div>
            <div style="margin-top:8px;">
              <button id="btnReloadHist">Draw Histogram</button>
              <button id="btnClearHist">Clear Histogram</button>
            </div>
            <div style="margin-top:8px;font-size:13px;color:#aaa;">
              Histogram draw batch
              <input
                id="inpHistBatch"
                type="number"
                min="1"
                step="1"
                value="10"
                style="width:90px; margin-left:8px;"
              />
            </div>
          </div>
          <hr />
          <div id="triggerCaptureBlock">
            <h4>Triggered capture</h4>
            <div style="margin-bottom:8px;">
              <span style="font-size:13px;">Channels</span>
              <div style="display:flex;flex-wrap:wrap;gap:8px 12px; margin-top:4px;">
                <label style="display:flex;align-items:center;gap:4px;"><input type="checkbox" id="trigChCH1" checked /> CH1</label>
                <label style="display:flex;align-items:center;gap:4px;"><input type="checkbox" id="trigChCH2" /> CH2</label>
                <label style="display:flex;align-items:center;gap:4px;"><input type="checkbox" id="trigChCH3" /> CH3</label>
                <label style="display:flex;align-items:center;gap:4px;"><input type="checkbox" id="trigChCH4" /> CH4</label>
              </div>
            </div>
            <button id="btnStartTriggered">Start Triggered Capture</button>
            <button id="btnStopTriggered">Stop Triggered Capture</button>
            <div id="triggerStatus" style="margin-top:4px;font-size:13px;color:#ddd;">
              Triggered capture: idle
            </div>
            <div id="triggerStats" style="margin-top:2px;font-size:12px;color:#999;">
              Total: 0, Rate: -, Duration: -, Last: -
            </div>
          </div>
        </section>
        <!-- Captures list section removed -->
      </div>
    </main>

    <script>
      const CHANNEL_IDS = ["CH1", "CH2", "CH3", "CH4"];
      const CHANNEL_COLORS = { CH1: "#E8D63B", CH2: "#2ECFD9", CH3: "#D870E8", CH4: "#52C755" };
      const statusEl = document.getElementById("status");
      const activityBadgeEl = document.getElementById("activityBadge");
      const streamBlockEl = document.getElementById("streamBlock");
      const triggerCaptureBlockEl = document.getElementById("triggerCaptureBlock");
      let baselineValue = null;
      let isStreaming = false;
      let isRecording = false;
      let lastWaveformChannels = [];

      function getEnabledChannels() {
        return CHANNEL_IDS.filter((ch) => {
          const el = document.getElementById("ch" + ch);
          return el && el.checked;
        });
      }

      function getDisplayChannels() {
        return getEnabledChannels();
      }

      function getTriggerCaptureChannels() {
        return CHANNEL_IDS.filter((ch) => {
          const el = document.getElementById("trigCh" + ch);
          return el && el.checked;
        });
      }

      function getHistDrawChannels() {
        return CHANNEL_IDS.filter((ch) => {
          const el = document.getElementById("histDraw" + ch);
          return el && el.checked;
        });
      }

      CHANNEL_IDS.forEach((ch) => {
        const el = document.getElementById("ch" + ch);
        if (el) el.addEventListener("change", () => {
          if (ws && ws.readyState === WebSocket.OPEN) {
            const channels = getEnabledChannels();
            ws.send(JSON.stringify({ channels: channels.length ? channels : ["CH1"] }));
          }
        });
      });

      function updateActivityBadge() {
        if (!activityBadgeEl) return;
        activityBadgeEl.className = "";
        activityBadgeEl.textContent = "";
        if (isRecording) {
          activityBadgeEl.className = "recording";
          activityBadgeEl.innerHTML = '<span class="dot"></span>RECORDING';
        } else if (isStreaming) {
          activityBadgeEl.className = "streaming";
          activityBadgeEl.innerHTML = '<span class="dot"></span>STREAMING';
        }
        if (streamBlockEl) {
          streamBlockEl.classList.toggle("section-busy", isStreaming);
          streamBlockEl.classList.toggle("stream-section", isStreaming);
        }
        if (triggerCaptureBlockEl) {
          triggerCaptureBlockEl.classList.toggle("section-busy", isRecording);
        }
      }
      const plotLayoutDark = {
        paper_bgcolor: "#121212",
        plot_bgcolor: "#000",
        font: { color: "#e0e0e0", size: 13 },
        margin: { t: 28, r: 28, b: 44, l: 52 },
        xaxis: { gridcolor: "#333", zerolinecolor: "#444" },
        yaxis: { gridcolor: "#333", zerolinecolor: "#444" },
        showlegend: false,
      };

      function setStatus(text) {
        statusEl.textContent = "status: " + text;
      }

      function drawWaveformMulti(time, voltageDict) {
        const hasTime = time && time.length > 0;
        const isMulti = voltageDict && typeof voltageDict === "object" && !Array.isArray(voltageDict);
        const firstCh = isMulti ? (Object.keys(voltageDict)[0] || "CH1") : "CH1";
        const firstY = isMulti ? (voltageDict[firstCh] || []) : (Array.isArray(voltageDict) ? voltageDict : []);
        if (!hasTime && (!firstY || firstY.length === 0)) return;
        const timeUse = hasTime ? time : (firstY ? firstY.map((_, i) => i) : []);
        const tMin = timeUse[0];
        const tMax = timeUse[timeUse.length - 1];
        const trigLevelMv = parseFloat(document.getElementById("inpTrigLevel").value);
        const displayChannels = getDisplayChannels();
        CHANNEL_IDS.forEach((ch) => {
          const showRow = displayChannels.length === 0 ? ch === "CH1" : displayChannels.includes(ch);
          const y = showRow && (isMulti ? (voltageDict[ch] || []) : (ch === "CH1" ? (Array.isArray(voltageDict) ? voltageDict : []) : []));
          const voltageMv = y && y.length ? y.map((v) => v * 1000) : [];
          const len = voltageMv.length ? Math.min(timeUse.length, voltageMv.length) : 0;
          const shapes = [];
          if (baselineValue != null) {
            shapes.push({
              type: "line", x0: tMin, x1: tMax, y0: baselineValue, y1: baselineValue,
              xref: "x", yref: "y", line: { color: "#0a0", width: 1, dash: "dot" },
            });
          }
          if (!Number.isNaN(trigLevelMv)) {
            shapes.push({
              type: "line", x0: tMin, x1: tMax, y0: trigLevelMv, y1: trigLevelMv,
              xref: "x", yref: "y", line: { color: "#f80", width: 1, dash: "dash" },
            });
          }
          const layout = {
            ...plotLayoutDark,
            margin: { t: 6, r: 20, b: ch === "CH4" ? 32 : 16, l: 40 },
            xaxis: { ...plotLayoutDark.xaxis, title: ch === "CH4" ? "Time [s]" : "" },
            yaxis: { ...plotLayoutDark.yaxis, title: "mV" },
            shapes,
            showlegend: false,
          };
          const trace = len
            ? [{
                x: timeUse.slice(0, len),
                y: voltageMv.slice(0, len),
                type: "scatter",
                mode: "lines",
                line: { color: CHANNEL_COLORS[ch] || "#888", width: 1.2 },
              }]
            : [{ x: [], y: [], type: "scatter", mode: "lines" }];
          Plotly.react("wavePlot" + ch, trace, layout, { responsive: true });
        });
        lastWaveformChannels = isMulti ? Object.keys(voltageDict) : ["CH1"];
      }

      function drawHistogramMulti(items) {
        const countEl = document.getElementById("histCount");
        if (!items || items.length === 0) {
          if (countEl) countEl.textContent = "—";
          Plotly.react(
            "histPlot",
            [],
            {
              ...plotLayoutDark,
              xaxis: { ...plotLayoutDark.xaxis, title: "Peak diff [mV]" },
              yaxis: { ...plotLayoutDark.yaxis, title: "Count" },
            },
            { responsive: true }
          );
          return;
        }
        const traces = [];
        let totalSamples = 0;
        items.forEach(({ channel, bins, counts }) => {
          const hasData = bins && bins.length >= 2 && counts && counts.length > 0;
          if (hasData) {
            totalSamples += counts.reduce((a, b) => a + b, 0);
          }
          const samplesMv = [];
          if (hasData) {
            for (let i = 0; i < counts.length; i++) {
              const left = bins[i];
              const right = bins[i + 1];
              const centerMv = ((left + right) / 2) * 1000;
              const n = counts[i];
              for (let k = 0; k < n; k++) samplesMv.push(centerMv);
            }
          }
          traces.push({
            x: samplesMv,
            type: "histogram",
            name: hasData ? channel : channel + " (no data)",
            marker: {
              color: "rgba(0,0,0,0)",
              line: { color: CHANNEL_COLORS[channel] || "#888", width: 1.2 },
            },
          });
        });
        if (countEl) countEl.textContent = totalSamples > 0 ? totalSamples + " samples" : "—";
        Plotly.react(
          "histPlot",
          traces,
          {
            ...plotLayoutDark,
            showlegend: true,
            legend: { x: 1.02, y: 1 },
            xaxis: { ...plotLayoutDark.xaxis, title: "Peak diff [mV]" },
            yaxis: { ...plotLayoutDark.yaxis, title: "Count" },
          },
          { responsive: true }
        );
      }

      document.getElementById("btnHealth").onclick = async () => {
        try {
          const res = await fetch("/health");
          const data = await res.json();
          setStatus(data.status + " (" + (data.idn || "n/a") + ")");
        } catch (e) {
          setStatus("error " + e);
        }
      };

      function computeFrequencyHz(time, voltage) {
        if (!time || time.length < 3 || !voltage || voltage.length !== time.length)
          return null;
        const mean =
          voltage.reduce((a, b) => a + b, 0) / voltage.length;
        const crossings = [];
        for (let i = 1; i < voltage.length; i++) {
          const v0 = voltage[i - 1] - mean;
          const v1 = voltage[i] - mean;
          if (v0 < 0 && v1 >= 0) {
            const dt = time[i] - time[i - 1];
            const t =
              dt > 0
                ? time[i - 1] + dt * (-v0) / (v1 - v0)
                : time[i - 1];
            crossings.push(t);
          }
        }
        if (crossings.length < 2) return null;
        const period =
          2 * (crossings[crossings.length - 1] - crossings[0]) /
          (crossings.length - 1);
        return period > 0 ? 1 / period : null;
      }

      function updateFreqDisplay(time, voltage) {
        const el = document.getElementById("freqDisplay");
        if (!el) return;
        const f = computeFrequencyHz(time, voltage);
        if (f != null && f > 0 && f < 1e9) {
          el.textContent = f >= 1000 ? (f / 1000).toFixed(2) + " kHz" : f.toFixed(2) + " Hz";
          el.style.color = "#81c784";
        } else {
          el.textContent = "— Hz";
          el.style.color = "#666";
        }
      }

      let ws = null;
      document.getElementById("btnStreamToggle").onclick = () => {
        if (ws) {
          ws.close();
          ws = null;
          isStreaming = false;
          updateActivityBadge();
          setStatus("stream stopped");
          document.getElementById("btnStreamToggle").textContent = "Start Stream";
          updateFreqDisplay(null, null);
          if (triggerStatusTimer && !isRecording) {
            clearInterval(triggerStatusTimer);
            triggerStatusTimer = null;
          }
          return;
        }
        ws = new WebSocket(
          (location.protocol === "https:" ? "wss://" : "ws://") +
            location.host +
            "/ws/stream"
        );
        ws.onopen = () => {
          isStreaming = true;
          updateActivityBadge();
          setStatus("streaming...");
          document.getElementById("btnStreamToggle").textContent = "Stop Stream";
          const channels = getEnabledChannels();
          if (channels.length) ws.send(JSON.stringify({ channels }));
          if (!triggerStatusTimer) {
            triggerStatusTimer = setInterval(refreshTriggerStatus, 1000);
            refreshTriggerStatus();
          }
        };
        ws.onmessage = (ev) => {
          const data = JSON.parse(ev.data);
          let v = {};
          if (Array.isArray(data.voltage)) {
            v = { CH1: data.voltage };
          } else if (data.voltage && typeof data.voltage === "object") {
            v = data.voltage;
          }
          if (Object.keys(v).length === 0 && data.voltage_primary) {
            v = { CH1: data.voltage_primary };
          }
          if (Object.keys(v).length === 0) v = { CH1: [] };
          let time = data.time;
          if ((!time || time.length === 0) && v.CH1 && v.CH1.length > 0) {
            time = v.CH1.map((_, i) => i);
          }
          drawWaveformMulti(time, v);
          const firstCh = getEnabledChannels()[0] || "CH1";
          updateFreqDisplay(time, v[firstCh] || []);
        };
        ws.onclose = () => {
          ws = null;
          isStreaming = false;
          updateActivityBadge();
          document.getElementById("btnStreamToggle").textContent = "Start Stream";
          setStatus("stream closed");
          updateFreqDisplay(null, null);
          if (triggerStatusTimer && !isRecording) {
            clearInterval(triggerStatusTimer);
            triggerStatusTimer = null;
          }
        };
        ws.onerror = () => {
          setStatus("stream error");
        };
      };

      document.getElementById("btnApplyTrigger").onclick = async () => {
        const src = document.getElementById("selTrigSource").value;
        const mode = document.getElementById("selTrigMode").value;
        const levelMv = parseFloat(
          document.getElementById("inpTrigLevel").value || "0"
        );
        const level = levelMv / 1000;
        try {
          await fetch("/trigger/source", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ source: src }),
          });
          await fetch("/trigger/mode", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ mode }),
          });
          await fetch("/trigger/level", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ level }),
          });
          setStatus("trigger updated");
        } catch (e) {
          setStatus("trigger error " + e);
        }
      };

      document.getElementById("btnSetBaseline").onclick = async () => {
        const mv = parseFloat(
          document.getElementById("inpBaseline").value || "0"
        );
        try {
          const res = await fetch("/baseline/set", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ value: mv / 1000 }),
          });
          const data = await res.json();
          baselineValue = data.baseline != null ? data.baseline * 1000 : null;
          if (baselineValue != null) document.getElementById("inpBaseline").value = baselineValue;
          setStatus("baseline=" + (baselineValue != null ? baselineValue : "") + " mV (all channels)");
        } catch (e) {
          setStatus("baseline error " + e);
        }
      };

      document.getElementById("btnReloadHist").onclick = async () => {
        const channels = getHistDrawChannels();
        if (channels.length === 0) {
          drawHistogramMulti([]);
          setStatus("no channel selected for histogram");
          return;
        }
        try {
          const results = await Promise.all(
            channels.map((ch) =>
              fetch("/analysis/histogram?channel=" + encodeURIComponent(ch)).then((r) => r.json())
            )
          );
          const items = channels.map((ch, i) => ({
            channel: ch,
            bins: results[i].bins || [],
            counts: results[i].counts || [],
          }));
          drawHistogramMulti(items);
          const total = results.reduce((s, d) => s + (d.count || 0), 0);
          setStatus("hist count=" + total);
        } catch (e) {
          setStatus("hist error " + e);
        }
      };

      document.getElementById("btnClearHist").onclick = async () => {
        const channels = getHistDrawChannels();
        if (channels.length === 0) {
          setStatus("no channel selected to clear");
          return;
        }
        try {
          await Promise.all(
            channels.map((ch) =>
              fetch("/analysis/clear", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ channel: ch }),
              })
            )
          );
          drawHistogramMulti([]);
          setStatus("histogram cleared (" + channels.join(", ") + ")");
          channels.forEach((ch) => { lastHistogramDisplayedHistCount[ch] = 0; });
        } catch (e) {
          setStatus("clear error " + e);
        }
      };

      const triggerStatusEl = document.getElementById("triggerStatus");
      const triggerStatsEl = document.getElementById("triggerStats");
      let triggerStatusTimer = null;

      function setTriggerStatus(
        active,
        runId,
        count,
        ratePerMin,
        durationSec,
        lastSaved,
        histCount
      ) {
        isRecording = !!active;
        updateActivityBadge();
        if (!triggerStatusEl) return;
        if (!triggerStatsEl) return;
        if (!active) {
          triggerStatusEl.textContent = "Triggered capture: idle";
          triggerStatsEl.textContent =
            "Total: 0, Rate: -, Duration: -, Last: -";
        } else {
          triggerStatusEl.textContent =
            "Triggered capture: running (run_id=" +
            (runId || "n/a") +
            ", saved=" +
            count +
            ")";
          const rateHz =
            typeof ratePerMin === "number" && ratePerMin >= 0
              ? ratePerMin / 60
              : null;
          const rateText =
            typeof rateHz === "number"
              ? rateHz.toFixed(2) + " Hz"
              : "-";
          let durationText = "-";
          if (typeof durationSec === "number") {
            const d = Math.max(0, Math.floor(durationSec));
            const h = Math.floor(d / 3600);
            const m = Math.floor((d % 3600) / 60);
            const s = d % 60;
            durationText =
              (h > 0 ? String(h).padStart(2, "0") + ":" : "") +
              String(m).padStart(2, "0") +
              ":" +
              String(s).padStart(2, "0");
          }
          const lastText = lastSaved || "-";
          triggerStatsEl.textContent =
            "Total: " +
            count +
            ", Rate: " +
            rateText +
            ", Duration: " +
            durationText +
            ", Last: " +
            lastText;
        }
      }

      function getHistBatch() {
        const el = document.getElementById("inpHistBatch");
        const v = el ? parseInt(el.value, 10) : 10;
        return Number.isFinite(v) && v > 0 ? v : 10;
      }

      let lastHistogramDisplayedHistCount = {};

      async function refreshTriggerStatus() {
        try {
          const res = await fetch("/trigger_capture/status");
          const data = await res.json();
          const wasRecording = isRecording;
          isRecording = !!data.active;
          updateActivityBadge();
          setTriggerStatus(
            data.active,
            data.run_id,
            data.saved_count || 0,
            data.rate_per_min ?? null,
            data.duration_s ?? null,
            data.last_saved_at || null,
            data.histogram_count || {}
          );

          const drawChannels = getHistDrawChannels();
          const histCounts = data.histogram_count || {};
          const batch = getHistBatch();
          const monitorActive = data.active || isStreaming;
          let shouldDraw = false;
          if (drawChannels.length > 0) {
            if (monitorActive) {
              shouldDraw = drawChannels.some(
                (ch) =>
                  (lastHistogramDisplayedHistCount[ch] || 0) === 0 ||
                  (histCounts[ch] || 0) - (lastHistogramDisplayedHistCount[ch] || 0) >= batch
              );
            } else {
              shouldDraw =
                wasRecording &&
                drawChannels.some((ch) => (histCounts[ch] || 0) > (lastHistogramDisplayedHistCount[ch] || 0));
            }
          }

          if (shouldDraw && drawChannels.length > 0) {
            drawChannels.forEach((ch) => {
              lastHistogramDisplayedHistCount[ch] = histCounts[ch] || 0;
            });
            const results = await Promise.all(
              drawChannels.map((ch) =>
                fetch("/analysis/histogram?channel=" + encodeURIComponent(ch)).then((r) => r.json())
              )
            );
            const items = drawChannels.map((ch, i) => ({
              channel: ch,
              bins: results[i].bins || [],
              counts: results[i].counts || [],
            }));
            drawHistogramMulti(items);
          }
        } catch {
          // ignore
        }
      }

      document.getElementById("btnStartTriggered").onclick = async () => {
        const runId = document.getElementById("inpRunId").value || null;
        const channels = getTriggerCaptureChannels();
        try {
          const res = await fetch("/trigger_capture/start", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ run_id: runId, channels: channels.length ? channels : ["CH1"] }),
          });
          const data = await res.json();
          if (!res.ok) {
            setStatus(
              "triggered capture start http " +
                res.status +
                ": " +
                (data.detail || JSON.stringify(data)).slice(0, 80)
            );
            return;
          }
          setStatus(
            "triggered capture started (run_id=" +
              data.run_id +
              ", saved=" +
              (data.saved_count || 0) +
              ")"
          );
          lastHistogramDisplayedHistCount = {};
          setTriggerStatus(
            true,
            data.run_id,
            data.saved_count || 0,
            0,
            0,
            null,
            data.histogram_count || {}
          );
          if (!triggerStatusTimer) {
            triggerStatusTimer = setInterval(refreshTriggerStatus, 1000);
            refreshTriggerStatus();
          }
        } catch (e) {
          setStatus("triggered capture start error " + e);
        }
      };

      fetch("/baseline").then((r) => r.json()).then((d) => {
        if (d.baseline != null) {
          baselineValue = d.baseline * 1000;
          document.getElementById("inpBaseline").value = baselineValue;
        }
      }).catch(() => {});

      fetch("/camera/config")
        .then((r) => r.json())
        .then((d) => {
          const el = document.getElementById("cameraSection");
          if (el) el.style.display = d.enabled ? "block" : "none";
        })
        .catch(() => {
          const el = document.getElementById("cameraSection");
          if (el) el.style.display = "none";
        });

      document.getElementById("btnStopTriggered").onclick = async () => {
        try {
          const res = await fetch("/trigger_capture/stop", { method: "POST" });
          const data = await res.json();
          setStatus(
            "triggered capture stopped (run_id=" +
              (data.run_id || "n/a") +
              ", saved=" +
              (data.saved_count || 0) +
              ")"
          );
          setTriggerStatus(
            false,
            null,
            data.saved_count || 0,
            null,
            null,
            data.last_saved_at || null,
            data.histogram_count || {}
          );
          if (triggerStatusTimer) {
            if (!isStreaming) {
              clearInterval(triggerStatusTimer);
              triggerStatusTimer = null;
            }
          }
          lastHistogramDisplayedHistCount = {};
          const drawChannels = getHistDrawChannels();
          if (drawChannels.length > 0) {
            try {
              const results = await Promise.all(
                drawChannels.map((ch) =>
                  fetch("/analysis/histogram?channel=" + encodeURIComponent(ch)).then((r) => r.json())
                )
              );
              const items = drawChannels.map((ch, i) => ({
                channel: ch,
                bins: results[i].bins || [],
                counts: results[i].counts || [],
              }));
              drawHistogramMulti(items);
            } catch (e) {}
          }
        } catch (e) {
          setStatus("triggered capture stop error " + e);
        }
      };
    </script>
  </body>
</html>
